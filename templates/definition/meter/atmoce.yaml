template: atmoce
products:
  - brand: Atmoce
    description:
      generic: MG100 M-gateway
capabilities: ["battery-control"]
requirements:
  description:
    de: |
      Unterstützung für Atmoce MG100 (im Lieferumfang von MC100 und MC100-T enthalten)
    en: |
      Support for Atmoce MG100 (included with MC100 and MC100-T)
params:
  - name: usage
    choice: ["grid", "pv", "battery"]
    allinone: true
  - name: modbus
    choice: ["rs485", "tcpip"]
    baudrate: 9600
    id: 1
  - name: capacity
    advanced: true
  - name: minsoc
    advanced: true
  - name: maxsoc
    advanced: true
  - name: maxacpower
render: |
  type: custom
  {{- if eq .usage "grid" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 60073 # Grid Active Power (kW)
      type: holding
      decode: int32
    scale: 0.001
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 60184 # Cumulative Electricity Purchase Volume (kWh)
      type: holding
      decode: uint64
    scale: 0.01
  currents:
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 60090 # Phase A Grid Current (A)
      type: holding
      decode: int16
    scale: 0.01
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 60092 # Phase B Grid Current (A)
      type: holding
      decode: int16
    scale: 0.01
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 60094 # Phase C Grid Current (A)
      type: holding
      decode: int16
    scale: 0.01
  {{- end }}
  {{- if eq .usage "pv" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 60069 # Photovoltaic Power Output (kW)
      type: holding
      decode: uint32
    scale: 0.001
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 60160 # Cumulative Photovoltaic Power Generation (kWh)
      type: holding
      decode: uint64
    scale: 0.01
  maxacpower: {{ .maxacpower }}
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 60316 # Energy Storage Dispatch Charging/Discharging Power (kW)
      type: holding
      decode: int32
    scale: 0.001
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 60166 # Cumulative Energy Storage Charging Capacity (kWh)
      type: holding
      decode: uint64
    scale: 0.01
  soc:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 60095 # Energy Storage SOC (%)
      type: holding
      decode: uint16
    scale: 1
  batterymode:
    source: switch
    switch:
    - case: 1 # normal 
      set:
        source: const
        value: 2
        set:
          source: modbus
          {{- include "modbus" . | indent 8 }}
          register:
            address: 60310 # Energy Storage Forced Charging/Discharging (0 = Forced charging, 1 = Forced discharging, 2 = Exit forced charging/discharging)
            type: writemultiple
            decode: uint16
    - case: 2 # hold -> Enable grid charging with minimum target soc -> will not start charging but will prevent uncharging of battery 
      set:
        source: sequence
        set:
        - source: const
          value: {{ .minsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 60312 # Energy Storage Forced Charging/Discharging Target SOC
              type: writemultiple
              decode: uint16
        - source: const
          value: 0
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 60311 # Energy Storage Forced Charging/Discharging Mode (0 = Target SOC, 1 = Charging/discharging duration)
              type: writemultiple
              decode: uint16
        - source: const
          value: 0
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 60310 # Energy Storage Forced Charging/Discharging (0 = Forced charging, 1 = Forced discharging, 2 = Exit forced charging/discharging)
              type: writemultiple
              decode: uint16
    - case: 3 # charge -> Enable grid charging with maximum target soc (will be stopped by evcc)
      set:
        source: sequence
        set:
        - source: const
          value: {{ .maxsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 60312 # Energy Storage Forced Charging/Discharging Target SOC
              type: writemultiple
              decode: uint16
        - source: const
          value: 0
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 60311 # Energy Storage Forced Charging/Discharging Mode (0 = Target SOC, 1 = Charging/discharging duration)
              type: writemultiple
              decode: uint16
        - source: const
          value: 0
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 60310 # Energy Storage Forced Charging/Discharging (0 = Forced charging, 1 = Forced discharging, 2 = Exit forced charging/discharging)
              type: writemultiple
              decode: uint16
  capacity: {{ .capacity }} # kWh
  {{- end }}
